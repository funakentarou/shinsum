name: シンsum理論 自動更新

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日日本時間9時
  workflow_dispatch:  # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Python設定
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: ライブラリインストール
        run: pip install pandas selenium openpyxl
      
      - name: データ取得・HTML生成
        run: |
          python3 auto_scraper.py
          python3 shinsum_fixed.py
      
      - name: GitHubにアップロード
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "シンsumデータ更新 $(date '+%Y-%m-%d')" || echo "変更なし"
          git push
