name: シンsum理論 自動更新

on:
  schedule:
    - cron: '20 23 * * *'
    - cron: '*/5 23 * * *'
    - cron: '*/5 0-13 * * *'
    - cron: '40,45 13 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python設定
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ライブラリインストール
        run: pip install pandas selenium openpyxl webdriver-manager beautifulsoup4 requests

      - name: Chromeインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: データ取得・HTML生成
        run: |
          python3 auto_scraper.py
          python3 shinsum_fixed.py
          cp shinsum_complete.html index.html

      - name: GitHubにアップロード
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "シンsumデータ更新 $(date '+%Y-%m-%d %H:%M')" || echo "変更なし"
          git push
